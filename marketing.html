function spark(arr,col){var max=Math.max.apply(null,arr);return'<div class="spark">'+arr.map(function(v){return'<div class="spark-b" style="height:'+(v/max*100)+'%;background:'+(col||"#fef2f0")+'" data-v="'+v+'"></div>'}).join("")+'</div>'}
function toast(m,t){var e=document.getElementById("toast");e.textContent=m;e.className="toast "+(t||"ok")+" show";setTimeout(function(){e.className="toast"},2500)}
function esc(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}

function render(){
  var d=DATA[cw];if(!d)return;
  if(ct==="ov")rOv(d);
  if(ct==="go")rGo(d);
  if(ct==="me")rMe(d);
  if(ct==="ga")rGa(d);
  if(ct==="nb")rNb(d);
  if(ct==="rp")rRp(d);
}

function kpi(label,value,sub,d){var dh=d!==undefined?dPill(d):"";return'<div class="sc"><div class="sc-l">'+label+'</div><div class="sc-v">'+value+'</div><div class="sc-s">'+(sub||"")+'</div>'+dh+'</div>'}

function rOv(d){
  var totSpend=d.go.spend+d.me.spend;
  var totImp=d.go.imp+d.me.imp;
  var totCl=d.go.cl+d.me.cl;
  var totConv=d.go.conv+d.me.conv;
  var roasMix=((d.go.spend*d.go.roas)+(d.me.spend*2.4))/totSpend;
  var html='<div class="sr">'+
    kpi("Marketing budget",fmtE(totSpend),"Google + Meta",delta())+
    kpi("Bereik",fmt(totImp),"impressies + reach",delta())+
    kpi("Conversies",String(totConv),"website + leads",delta())+
    kpi("ROAS gemiddeld",roasMix.toFixed(1)+"x","return on ad spend",delta())+
    '</div>';
  html+='<div class="sec-h">Verdeling per kanaal</div>';
  var ch=[{n:"Google Ads",v:d.go.spend,col:"#3478f6"},{n:"Meta Ads",v:d.me.spend,col:"#c8524b"}];
  var maxCh=Math.max.apply(null,ch.map(function(c){return c.v}));
  html+='<div class="cc"><h3>Spend per kanaal</h3>'+ch.map(function(c){return '<div class="br"><span class="bl2">'+c.n+'</span><div class="bt"><div class="bf" style="width:'+(c.v/maxCh*100)+'%;background:'+c.col+'"></div><span class="bv" style="color:'+c.col+'">'+fmtE(c.v)+'</span></div></div>'}).join("")+'</div>';
  html+='<div class="cg">';
  html+='<div class="cc"><h3>Spend trend (12 weken)</h3>'+spark(d.go.trend.map(function(v,i){return v+(d.me.trend[i]||0)}),"#c8524b")+'</div>';
  html+='<div class="cc"><h3>Sessies trend (12 weken)</h3>'+spark(d.ga.trend,"#3478f6")+'</div>';
  html+='</div>';
  html+='<div class="sec-h">Kanaal-samenvatting</div>';
  html+='<div class="tw"><table><thead><tr><th>Kanaal</th><th>Spend</th><th>Bereik</th><th>Clicks / Sessies</th><th>Conversies</th><th>ROAS / Engagement</th></tr></thead><tbody>'+
    '<tr><td><span class="pill p-go">Google Ads</span></td><td class="tnum">'+fmtE(d.go.spend)+'</td><td class="tnum">'+fmt(d.go.imp)+'</td><td class="tnum">'+fmt(d.go.cl)+'</td><td class="tnum">'+d.go.conv+'</td><td class="tnum">'+d.go.roas.toFixed(1)+'x</td></tr>'+
    '<tr><td><span class="pill p-me">Meta Ads</span></td><td class="tnum">'+fmtE(d.me.spend)+'</td><td class="tnum">'+fmt(d.me.reach)+'</td><td class="tnum">'+fmt(d.me.cl)+'</td><td class="tnum">'+d.me.conv+'</td><td class="tnum">'+d.me.ctr.toFixed(2)+'%</td></tr>'+
    '<tr><td><span class="pill p-ga">Analytics</span></td><td class="tnum">—</td><td class="tnum">'+fmt(d.ga.usr)+' users</td><td class="tnum">'+fmt(d.ga.ses)+'</td><td class="tnum">—</td><td class="tnum">'+d.ga.br.toFixed(1)+'% bounce</td></tr>'+
    '<tr><td><span class="pill p-nb">Nieuwsbrief</span></td><td class="tnum">—</td><td class="tnum">'+fmt(d.nb.vz)+'</td><td class="tnum">'+d.nb.cl+' clicks</td><td class="tnum">—</td><td class="tnum">'+d.nb.or.toFixed(1)+'% open</td></tr>'+
    '</tbody></table></div>';
  document.getElementById("s-ov").innerHTML=html;
}

function rGo(d){
  var g=d.go;
  var html='<div class="sr">'+
    kpi("Spend",fmtE(g.spend),"deze "+cp,delta())+
    kpi("Impressies",fmt(g.imp),"vertoningen",delta())+
    kpi("Clicks",fmt(g.cl),"CTR "+g.ctr.toFixed(2)+"%",delta())+
    kpi("Conversies",String(g.conv),"CPC "+fmtE(g.cpc),delta())+
    '</div>';
  html+='<div class="sr-2">'+
    kpi("ROAS",g.roas.toFixed(1)+"x","return on ad spend")+
    kpi("Cost per conversion",fmtE(Math.round(g.spend/g.conv)),"gemiddeld")+
    '</div>';
  html+='<div class="cc"><h3>Spend trend (12 weken)</h3>'+spark(g.trend,"#3478f6")+'</div>';
  html+='<div class="sec-h">Top campagnes</div>';
  html+='<div class="tw"><table><thead><tr><th>Campagne</th><th>Impressies</th><th>Clicks</th><th>Spend</th><th>Conversies</th></tr></thead><tbody>'+g.top.map(function(c){return '<tr><td><strong>'+esc(c.c)+'</strong></td><td class="tnum">'+fmt(c.imp)+'</td><td class="tnum">'+fmt(c.cl)+'</td><td class="tnum">'+fmtE(c.sp)+'</td><td class="tnum">'+c.cv+'</td></tr>'}).join("")+'</tbody></table></div>';
  document.getElementById("s-go").innerHTML=html;
}

function rMe(d){
  var m=d.me;
  var html='<div class="sr">'+
    kpi("Spend",fmtE(m.spend),"deze "+cp,delta())+
    kpi("Reach",fmt(m.reach),"unieke gebruikers",delta())+
    kpi("Impressies",fmt(m.imp),"freq "+(m.imp/m.reach).toFixed(1)+"x",delta())+
    kpi("Clicks",fmt(m.cl),"CTR "+m.ctr.toFixed(2)+"%",delta())+
    '</div>';
  html+='<div class="sr-2">'+
    kpi("Conversies",String(m.conv),"vanuit Meta")+
    kpi("Cost per result",fmtE(m.cpr.toFixed(2)),"per conversie")+
    '</div>';
  html+='<div class="cc"><h3>Reach trend (12 weken)</h3>'+spark(m.trend,"#c8524b")+'</div>';
  html+='<div class="sec-h">Top advertenties</div>';
  html+='<div class="tw"><table><thead><tr><th>Advertentie</th><th>Reach</th><th>Clicks</th><th>Spend</th><th>Conversies</th></tr></thead><tbody>'+m.top.map(function(c){return '<tr><td><strong>'+esc(c.c)+'</strong></td><td class="tnum">'+fmt(c.reach)+'</td><td class="tnum">'+fmt(c.cl)+'</td><td class="tnum">'+fmtE(c.sp)+'</td><td class="tnum">'+c.cv+'</td></tr>'}).join("")+'</tbody></table></div>';
  document.getElementById("s-me").innerHTML=html;
}

function rGa(d){
  var a=d.ga;
  var min=Math.floor(a.dur/60),sec=a.dur%60;
  var html='<div class="sr">'+
    kpi("Sessies",fmt(a.ses),"website verkeer",delta())+
    kpi("Gebruikers",fmt(a.usr),"unieke bezoekers",delta())+
    kpi("Bounce rate",a.br.toFixed(1)+"%","één-pagina bezoek",delta()*-1)+
    kpi("Sessieduur",min+"m "+sec+"s","gemiddeld",delta())+
    '</div>';
  html+='<div class="cg">';
  html+='<div class="cc"><h3>Sessies trend (12 weken)</h3>'+spark(a.trend,"#d4940a")+'</div>';
  var maxSrc=Math.max.apply(null,a.src.map(function(s){return s.v}));
  var cols=["#c8524b","#3478f6","#22a559","#d4940a","#7c5bbf","#8c8c8c"];
  html+='<div class="cc"><h3>Verkeersbronnen</h3>'+a.src.map(function(s,i){return '<div class="br"><span class="bl2">'+s.n+'</span><div class="bt"><div class="bf" style="width:'+(s.v/maxSrc*100)+'%;background:'+cols[i%cols.length]+'"></div><span class="bv" style="color:'+cols[i%cols.length]+'">'+s.v+'%</span></div></div>'}).join("")+'</div>';
  html+='</div>';
  html+='<div class="sec-h">Best bezochte pagina\'s</div>';
  html+='<div class="tw"><table><thead><tr><th>Pagina</th><th>Views</th><th>Bounce rate</th></tr></thead><tbody>'+a.top.map(function(p){return '<tr><td><strong>'+esc(p.p)+'</strong></td><td class="tnum">'+fmt(p.vw)+'</td><td class="tnum">'+p.br.toFixed(1)+'%</td></tr>'}).join("")+'</tbody></table></div>';
  document.getElementById("s-ga").innerHTML=html;
}

function rNb(d){
  var n=d.nb;
  var html='<div class="sr">'+
    kpi("Verzonden",fmt(n.vz),"laatste maand")+
    kpi("Open rate",n.or.toFixed(1)+"%",fmt(n.go)+" geopend",delta())+
    kpi("Click rate",n.cr.toFixed(1)+"%",n.cl+" clicks",delta())+
    kpi("Bounces",String(n.bo),"niet bezorgd",delta()*-1)+
    '</div>';
  html+='<div class="cc"><h3>Open rate per maand (laatste jaar)</h3>'+spark(n.trend,"#7c5bbf")+'</div>';
  html+='<div class="sec-h">Performance</div>';
  html+='<div class="tw"><table><thead><tr><th>Metric</th><th>Waarde</th><th>Benchmark branche</th><th>Beoordeling</th></tr></thead><tbody>'+
    '<tr><td><strong>Open rate</strong></td><td class="tnum">'+n.or.toFixed(1)+'%</td><td class="tnum">28-32%</td><td>'+(n.or>32?'<span class="pill p-go" style="background:#edf9f2;color:#22a559">Boven gemiddeld</span>':'<span class="pill p-ga">Op niveau</span>')+'</td></tr>'+
    '<tr><td><strong>Click rate</strong></td><td class="tnum">'+n.cr.toFixed(1)+'%</td><td class="tnum">8-10%</td><td>'+(n.cr>10?'<span class="pill p-go" style="background:#edf9f2;color:#22a559">Boven gemiddeld</span>':'<span class="pill p-ga">Op niveau</span>')+'</td></tr>'+
    '<tr><td><strong>Bounce rate</strong></td><td class="tnum">'+(n.bo/n.vz*100).toFixed(2)+'%</td><td class="tnum">&lt; 2%</td><td><span class="pill p-go" style="background:#edf9f2;color:#22a559">Goed</span></td></tr>'+
    '</tbody></table></div>';
  document.getElementById("s-nb").innerHTML=html;
}

function rRp(d){
  var w=W.find(function(x){return x.id===cw});
  var totSpend=d.go.spend+d.me.spend;
  var roasMix=((d.go.spend*d.go.roas)+(d.me.spend*2.4))/totSpend;
  var maand=new Date().toLocaleString("nl-NL",{month:"long",year:"numeric"});
  var html='<div class="r-card">';
  html+='<div class="r-row"><div><div style="font-size:14px;font-weight:700;margin-bottom:2px">Maandrapport voor '+esc(w.n)+'</div><div style="font-size:12px;color:var(--mt)">'+maand+' &middot; alle marketing-cijfers in één mail</div></div></div>';
  html+='<div class="r-row" style="margin-top:14px"><div style="flex:1;min-width:240px"><label class="fl">Ontvanger</label><input class="fi" id="r-em" value="'+esc(SETTINGS.reportEmail||w.em)+'" placeholder="info@winkel.nl"></div><div><label class="fl">CC</label><input class="fi" id="r-cc" value="info@fietsencatalogus.nl"></div></div>';
  html+='<div class="r-row" style="margin-top:14px;align-items:center"><label class="toggle"><input type="checkbox" id="r-auto" '+(SETTINGS.autoSend?"checked":"")+' onchange="SETTINGS.autoSend=this.checked;toast(this.checked?\'Auto-verzending aan\':\'Auto-verzending uit\')"><span class="toggle-sw"></span><span class="toggle-lb">Automatisch versturen op de 1e van elke maand</span></label></div>';
  html+='<div class="r-row" style="margin-top:18px;justify-content:flex-end"><button class="tb" onclick="dlPdf()">Download PDF</button><button class="tb-pri" onclick="sendRp()">Verstuur nu</button></div>';
  html+='</div>';
  html+='<div class="sec-h">Voorbeeld mail</div>';
  html+='<div class="r-prev"><div class="r-mail">';
  html+='<div class="r-h"><div class="r-h-t">Marketing rapport — '+maand+'</div><div class="r-h-s">'+esc(w.n)+' &middot; aangeboden door Fietsencatalogus</div></div>';
  html+='<div class="r-b">';
  html+='<p>Hoi,</p><p>Hierbij de marketing-prestaties van '+maand.toLowerCase()+'. Hieronder de hoofdcijfers, in het dashboard kan je dieper inzoomen.</p>';
  html+='<div class="r-kpi">';
  html+='<div class="r-k"><div class="r-k-l">Totaal budget</div><div class="r-k-v">'+fmtE(totSpend)+'</div></div>';
  html+='<div class="r-k"><div class="r-k-l">ROAS gemiddeld</div><div class="r-k-v">'+roasMix.toFixed(1)+'x</div></div>';
  html+='<div class="r-k"><div class="r-k-l">Conversies</div><div class="r-k-v">'+(d.go.conv+d.me.conv)+'</div></div>';
  html+='<div class="r-k"><div class="r-k-l">Website sessies</div><div class="r-k-v">'+fmt(d.ga.ses)+'</div></div>';
  html+='</div>';
  html+='<div class="r-sec"><h4>Google Ads</h4><table class="r-tab"><tr><td>Spend</td><td>'+fmtE(d.go.spend)+'</td></tr><tr><td>Impressies</td><td>'+fmt(d.go.imp)+'</td></tr><tr><td>Clicks (CTR '+d.go.ctr.toFixed(1)+'%)</td><td>'+fmt(d.go.cl)+'</td></tr><tr><td>Conversies</td><td>'+d.go.conv+'</td></tr><tr><td>ROAS</td><td>'+d.go.roas.toFixed(1)+'x</td></tr></table></div>';
  html+='<div class="r-sec"><h4>Meta Ads</h4><table class="r-tab"><tr><td>Spend</td><td>'+fmtE(d.me.spend)+'</td></tr><tr><td>Reach</td><td>'+fmt(d.me.reach)+'</td></tr><tr><td>Clicks (CTR '+d.me.ctr.toFixed(1)+'%)</td><td>'+fmt(d.me.cl)+'</td></tr><tr><td>Conversies</td><td>'+d.me.conv+'</td></tr></table></div>';
  html+='<div class="r-sec"><h4>Website (GA4)</h4><table class="r-tab"><tr><td>Sessies</td><td>'+fmt(d.ga.ses)+'</td></tr><tr><td>Unieke bezoekers</td><td>'+fmt(d.ga.usr)+'</td></tr><tr><td>Bounce rate</td><td>'+d.ga.br.toFixed(1)+'%</td></tr><tr><td>Top pagina</td><td>'+esc(d.ga.top[0].p)+'</td></tr></table></div>';
  html+='<div class="r-sec"><h4>Nieuwsbrief</h4><table class="r-tab"><tr><td>Verzonden</td><td>'+fmt(d.nb.vz)+'</td></tr><tr><td>Open rate</td><td>'+d.nb.or.toFixed(1)+'%</td></tr><tr><td>Click rate</td><td>'+d.nb.cr.toFixed(1)+'%</td></tr></table></div>';
  html+='<p style="margin-top:18px">Vragen of suggesties? Reageer op deze mail of bel ons even.</p><p>Met vriendelijke groet,<br>Team Fietsencatalogus</p>';
  html+='</div>';
  html+='<div class="r-foot">Fietsencatalogus &middot; '+maand+' &middot; <a href="#" style="color:#666">afmelden</a></div>';
  html+='</div></div>';
  document.getElementById("s-rp").innerHTML=html;
}

function sendRp(){
  var em=document.getElementById("r-em").value;
  if(!em){toast("Geen ontvanger ingevuld","err");return}
  toast("Rapport verstuurd naar "+em);
}
function dlPdf(){toast("PDF-download — nog niet aangesloten","err")}

init();
</script>
</body>
</html>
